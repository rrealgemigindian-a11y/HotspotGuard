name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O gradle.zip
          unzip -q gradle.zip
          sudo mv gradle-8.5 /opt/gradle
          sudo ln -s /opt/gradle/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HotspotGuard-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
